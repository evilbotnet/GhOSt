name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  daemon:
    name: daemon (go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: daemon/go.sum
      - run: go vet ./...
      - run: go test ./...
      # Cross-compile both deployment targets so an arch-specific break is caught.
      - run: GOOS=linux GOARCH=arm64 go build ./...
      - run: GOOS=linux GOARCH=amd64 go build ./...

  shell:
    name: shell (svelte)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ghostos/shell check
      - run: pnpm --filter @ghostos/shell build
