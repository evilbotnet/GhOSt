openapi: 3.1.0
info:
  title: GhOSt ghostd API
  version: 0.1.0
  description: >
    Localhost-only system API served by the ghostd daemon. All endpoints require
    the per-session bearer token; the WebSocket authenticates via ?token=.
servers:
  - url: http://127.0.0.1:7700/api/v1
paths:
  /fs/home:
    get: { summary: Home directory, responses: { '200': { description: '{path}' } } }
  /fs/list:
    get:
      summary: List a directory (confined to allowed roots)
      parameters: [{ name: path, in: query, schema: { type: string } }]
      responses: { '200': { description: '{path, entries: DirEntry[]}' }, '403': { description: outside allowed roots } }
  /fs/read:
    get:
      summary: Read a text file (8 MB cap)
      parameters: [{ name: path, in: query, required: true, schema: { type: string } }]
      responses: { '200': { description: text/plain body } }
  /fs/write:
    put: { summary: 'Write {path, content}', responses: { '200': { description: ok } } }
  /fs/mkdir:
    post: { summary: 'Create directory {path}', responses: { '200': { description: ok } } }
  /fs/rename:
    post: { summary: 'Rename {from, to} (fails if destination exists)', responses: { '200': { description: ok } } }
  /fs/trash:
    post: { summary: 'Move {path} to ~/.ghost-trash', responses: { '200': { description: ok } } }
  /term:
    post: { summary: 'Create pty session {cols, rows} → {id}; I/O on WS topic term.<id>', responses: { '200': { description: '{id}' } } }
  /term/{id}:
    delete: { summary: Close pty session, responses: { '200': { description: ok } } }
  /system/status:
    get: { summary: Hostname/platform/wifi/battery/volume snapshot, responses: { '200': { description: SystemStatus } } }
  /system/wifi/networks:
    get: { summary: Scan Wi-Fi networks, responses: { '200': { description: 'WifiNetwork[]' } } }
  /system/wifi/connect:
    post: { summary: 'Connect {ssid, password?}', responses: { '200': { description: ok } } }
  /system/volume:
    post: { summary: 'Set output volume {percent}', responses: { '200': { description: ok } } }
  /browser/open:
    post: { summary: 'Open native browser window {url} (http/https only)', responses: { '200': { description: ok } } }
  /office/status:
    get: { summary: Local CryptPad availability, responses: { '200': { description: '{url, running}' }, '404': { description: not configured } } }
  /session/dev-token:
    get: { summary: 'DEV MODE ONLY: token bootstrap for the Vite origin', responses: { '200': { description: '{token}' } } }
components:
  schemas:
    DirEntry:
      type: object
      properties:
        name: { type: string }
        path: { type: string }
        dir: { type: boolean }
        size: { type: integer }
        modified: { type: string, format: date-time }
        mime: { type: string }
